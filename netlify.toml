# Netlify configuration for the Zipo Fare Logger (static site, no build step).
# The whole app is plain HTML/JS/CSS, so we just publish the folder as-is.

[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"

# Send anyone hitting the site root to the login page first. login.html itself
# forwards to index.html when a valid session already exists, and index.html
# bounces back to login.html when there's no session — so the gate holds either way.
[[redirects]]
  from = "/"
  to = "/login.html"
  status = 302
  force = false

# `publish = "."` serves every file in the repo, so scripts/ would otherwise be
# fetchable from the live site. Nothing in there holds a secret (the backfill
# script takes its key from the environment), but it is local admin tooling and
# has no business being served — 404 it.
[[redirects]]
  from = "/scripts/*"
  to = "/login.html"
  status = 404

# Sensible security headers. (These don't replace Supabase RLS — they're just
# good hygiene for a static site.)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
