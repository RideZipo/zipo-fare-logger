<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Zipo Fare Logger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14181F; --steel:#5B6572; --faint:#8B94A0;
    --paper:#F5F6F8; --card:#FFFFFF; --line:#E2E5EA; --line-soft:#EDEFF2;
    --signal:#2563C9; --signal-dk:#1D4FA8; --signal-wash:#EAF1FC;
    --danger:#B42318; --danger-wash:#FBEBE9; --ok:#0E7C5A;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:system-ui,-apple-system,'Segoe UI',sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);
    -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .box{width:100%;max-width:380px;}
  .mast{display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 18px;gap:12px;}
  .mast h1{font-family:var(--disp);font-weight:600;font-size:19px;letter-spacing:-0.02em;margin:0;}
  .mast .sub{font-size:12px;color:var(--faint);letter-spacing:0.04em;text-transform:uppercase;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:22px;box-shadow:0 1px 2px rgba(20,24,31,0.04),0 8px 24px rgba(20,24,31,0.03);}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .field label{font-size:11px;color:var(--faint);letter-spacing:0.05em;text-transform:uppercase;font-weight:500;}
  input{width:100%;font-family:var(--body);font-size:15px;padding:11px 12px;border:1px solid var(--line);
    border-radius:var(--r-sm);background:var(--card);color:var(--ink);transition:border-color .12s,box-shadow .12s;-webkit-appearance:none;}
  input:focus{outline:none;border-color:var(--signal);box-shadow:0 0 0 3px var(--signal-wash);}
  button.primary{width:100%;border:none;cursor:pointer;background:var(--signal);color:#fff;
    font-family:var(--disp);font-weight:600;font-size:16px;letter-spacing:-0.01em;padding:14px 20px;border-radius:var(--r-sm);
    box-shadow:0 1px 0 var(--signal-dk),0 4px 12px rgba(37,99,201,0.22);transition:background .12s,transform .08s;}
  button.primary:hover{background:var(--signal-dk);}
  button.primary:active{transform:translateY(1px);}
  button.primary:disabled{opacity:.6;cursor:default;}
  .msg{font-size:13px;margin-top:14px;padding:10px 12px;border-radius:var(--r-sm);display:none;}
  .msg.err{display:block;background:var(--danger-wash);color:var(--danger);}
  .msg.ok{display:block;background:#E1F5EE;color:var(--ok);}
  .foot{font-size:12px;color:var(--faint);margin-top:16px;text-align:center;line-height:1.5;}
</style>
</head>
<body>
  <div class="box">
    <div class="mast"><h1>Fare Logger</h1><span class="sub">Zipo</span></div>
    <div class="card">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="username" placeholder="you@ridezipo.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button class="primary" id="signIn">Sign in</button>
      <div class="msg" id="msg"></div>
      <div class="foot">Access is invite-only. If you need an account, ask the administrator to add you.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const cfg = window.ZIPO_CONFIG || {};
    const client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const $ = id => document.getElementById(id);
    const msg = (text, kind) => { const m=$('msg'); m.textContent=text; m.className='msg '+kind; };

    // Already signed in? Skip straight to the app.
    client.auth.getSession().then(({ data }) => {
      if (data.session) window.location.replace('index.html');
    });

    async function signIn() {
      const email = $('email').value.trim();
      const password = $('password').value;
      if (!email || !password) { msg('Enter your email and password.', 'err'); return; }
      $('signIn').disabled = true;
      msg('Signing in…', 'ok');
      const { error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        msg(error.message || 'Sign in failed.', 'err');
        $('signIn').disabled = false;
        return;
      }
      window.location.replace('index.html');
    }

    $('signIn').onclick = signIn;
    $('password').addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
    $('email').addEventListener('keydown', e => { if (e.key === 'Enter') $('password').focus(); });
  </script>
</body>
</html>
